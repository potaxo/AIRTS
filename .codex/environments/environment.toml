# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "AIRTS"

[setup]
script = ""

[setup.linux]
script = '''
set -euo pipefail

python3 - <<'PY'
import sys

expected = (3, 13)
actual = sys.version_info[:2]

if actual != expected:
    raise SystemExit(
        f"AIRTS requires Python {expected[0]}.{expected[1]}, "
        f"but this environment is using {actual[0]}.{actual[1]}."
    )
PY

if [[ ! -x .venv/bin/python ]]; then
    python3 -m venv .venv
fi

.venv/bin/python -m pip install --upgrade pip
.venv/bin/python -m pip install -e ".[dev]"
.venv/bin/python -m pip check'''

[[actions]]
name = "Check"
icon = "tool"
command = '''
.venv/bin/ruff check . &&
.venv/bin/ruff format --check . &&
.venv/bin/mypy src'''
platform = "linux"

[[actions]]
name = "Test"
icon = "tool"
command = ".venv/bin/python -m pytest"
